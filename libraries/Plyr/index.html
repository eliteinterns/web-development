<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plyr</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.3/dist/plyr.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .video-container {
      width: 80%;
      max-width: 800px;
      margin: 0 auto;
    }

    .plyr {
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="player" class="plyr" controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      <!-- English Subtitles -->
      <track label="English" kind="subtitles" srclang="en" src="movie_en.vtt" default>
      <!-- Spanish Subtitles -->
      <track label="Español" kind="subtitles" srclang="es" src="movie_sp.vtt">
      Your browser does not support the video tag.
    </video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.3/dist/plyr.polyfilled.js"></script>
  <script>
    const player = new Plyr('#player');
  </script>

</body>
</html>
